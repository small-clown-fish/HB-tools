name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bms_038b_heartbeat_writer_tool/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name BMS_038B_Heartbeat_Writer bms_038b_heartbeat_writer_tool/bms_038b_heartbeat_writer.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BMS_038B_Heartbeat_Writer_Windows
          path: dist/BMS_038B_Heartbeat_Writer.exe
